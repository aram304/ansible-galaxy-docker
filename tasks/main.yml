---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - python3
      - python3-requests
      - python3-docker
    state: present
    update_cache: true

- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download the official Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add the official Docker repository to APT sources
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Start Docker and enable it on boot
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Verify Docker installation
  ansible.builtin.command:
    cmd: docker --version
  register: docker_version
  changed_when: false
  failed_when: false

- name: Show successful Docker installation message
  ansible.builtin.debug:
    msg: "Docker has been installed successfully"
  when: docker_version.rc == 0

- name: Stop when Docker is not installed correctly
  ansible.builtin.fail:
    msg: "Docker installation failed: {{ docker_version.stderr }}"
  when: docker_version.rc != 0

- name: Copy the built Docker image to the VM
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/hello-world.tar"
    dest: /tmp/hello-world.tar
    mode: "0644"

- name: Load the Docker image
  community.docker.docker_image_load:
    path: /tmp/hello-world.tar

- name: Start the Hello World container
  community.docker.docker_container:
    name: hello-world
    image: hello-world:latest
    state: started
    restart_policy: always
    published_ports:
      - "8080:80"

- name: Test the Hello World container
  ansible.builtin.uri:
    url: http://127.0.0.1:8080
    method: GET
    return_content: true
    status_code: 200
  register: hello_world_response
  retries: 5
  delay: 2
  until: hello_world_response.status | default(0) == 200
  changed_when: false
  failed_when: false

- name: Show successful container check message
  ansible.builtin.debug:
    msg: "The Hello World container has been started successfully"
  when: hello_world_response.status | default(0) == 200

- name: Stop when the Hello World container does not respond
  ansible.builtin.fail:
    msg: "The Hello World container is not reachable"
  when: hello_world_response.status | default(0) != 200

